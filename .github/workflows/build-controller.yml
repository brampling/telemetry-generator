# Builds the controller linux/arm64 image and pushes it to GHCR. The Pi cluster
# pulls it; ArgoCD deploys it (pinned by SHA in k8s/kustomization.yaml).
name: build-controller

on:
    push:
        branches: [main]
        paths:
            - cmd/controller/**
            - internal/**
            - go.mod
            - go.sum
            - Dockerfile.controller
            - .github/workflows/build-controller.yml
    workflow_dispatch:

concurrency:
    group: build-controller-${{ github.ref }}
    cancel-in-progress: true

jobs:
    test:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4

            - uses: actions/setup-go@v5
              with:
                  go-version-file: go.mod
                  cache-dependency-path: go.sum

            - name: Vet & test
              run: |
                  go vet ./...
                  go test -race ./...

    controller:
        needs: test
        runs-on: ubuntu-latest
        permissions:
            contents: read
            packages: write
        steps:
            - uses: actions/checkout@v4

            - uses: docker/setup-buildx-action@v3

            - name: Log in to GHCR
              uses: docker/login-action@v3
              with:
                  registry: ghcr.io
                  username: ${{ github.actor }}
                  password: ${{ secrets.GITHUB_TOKEN }}

            - name: Image metadata
              id: meta
              uses: docker/metadata-action@v5
              with:
                  images: ghcr.io/brampling/telemetry-generator-controller
                  tags: |
                      type=sha,format=short
                      type=raw,value=latest,enable={{is_default_branch}}

            - name: Build and push
              uses: docker/build-push-action@v6
              with:
                  context: .
                  file: Dockerfile.controller
                  platforms: linux/arm64
                  push: true
                  tags: ${{ steps.meta.outputs.tags }}
                  labels: ${{ steps.meta.outputs.labels }}
                  build-args: |
                      VERSION=${{ github.sha }}
                  cache-from: type=gha
                  cache-to: type=gha,mode=max
