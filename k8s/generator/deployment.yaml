# Generator: the telemetry worker fleet. 3 replicas spread one-per-node so a
# single trace — which fans out through the generator Service back to this same
# fleet — has its spans produced by multiple pods across multiple nodes.
apiVersion: apps/v1
kind: Deployment
metadata:
    name: generator
    namespace: telemetry-generator
    labels:
        app.kubernetes.io/name: generator
        app.kubernetes.io/part-of: telemetry-generator
spec:
    replicas: 3
    selector:
        matchLabels:
            app.kubernetes.io/name: generator
    template:
        metadata:
            labels:
                app.kubernetes.io/name: generator
                app.kubernetes.io/part-of: telemetry-generator
        spec:
            imagePullSecrets:
                - name: ghcr-pull
            # Spread replicas across nodes (3 Pis) so traces span nodes, not just
            # pods. ScheduleAnyway keeps the app up if a node is unavailable.
            topologySpreadConstraints:
                - maxSkew: 1
                  topologyKey: kubernetes.io/hostname
                  whenUnsatisfiable: ScheduleAnyway
                  labelSelector:
                      matchLabels:
                          app.kubernetes.io/name: generator
            securityContext:
                runAsNonRoot: true
                runAsUser: 65532
                runAsGroup: 65532
                fsGroup: 65532
                seccompProfile:
                    type: RuntimeDefault
            containers:
                - name: generator
                  image: ghcr.io/brampling/telemetry-generator-generator:latest
                  ports:
                      - name: http
                        containerPort: 8080
                  env:
                      - name: OTEL_SERVICE_NAME
                        value: telemetry-generator-generator
                      # OTLP target. The Dash0 operator's cluster collector today;
                      # point this at a custom collector later by editing it here.
                      - name: OTEL_EXPORTER_OTLP_ENDPOINT
                        value: http://dash0-operator-opentelemetry-collector-service.dash0-system.svc.cluster.local:4317
                      - name: OTEL_EXPORTER_OTLP_PROTOCOL
                        value: grpc
                      - name: DEPLOY_ENV
                        value: picluster
                      # Peer fan-out target: the Service in front of this fleet, so
                      # each hop lands on whichever replica the LB picks.
                      - name: PEER_ENDPOINT
                        value: http://generator.telemetry-generator.svc.cluster.local
                      # Enrich telemetry with pod/node identity via the downward API.
                      - name: POD_NAME
                        valueFrom:
                            fieldRef:
                                fieldPath: metadata.name
                      - name: POD_NAMESPACE
                        valueFrom:
                            fieldRef:
                                fieldPath: metadata.namespace
                      - name: NODE_NAME
                        valueFrom:
                            fieldRef:
                                fieldPath: spec.nodeName
                      - name: OTEL_RESOURCE_ATTRIBUTES
                        value: k8s.pod.name=$(POD_NAME),k8s.namespace.name=$(POD_NAMESPACE),k8s.node.name=$(NODE_NAME)
                  securityContext:
                      allowPrivilegeEscalation: false
                      readOnlyRootFilesystem: true
                      capabilities:
                          drop:
                              - ALL
                  resources:
                      requests:
                          cpu: 50m
                          memory: 48Mi
                      limits:
                          cpu: 500m
                          memory: 128Mi
                  livenessProbe:
                      httpGet:
                          path: /healthz
                          port: http
                      initialDelaySeconds: 5
                      periodSeconds: 15
                  readinessProbe:
                      httpGet:
                          path: /readyz
                          port: http
                      initialDelaySeconds: 3
                      periodSeconds: 10
