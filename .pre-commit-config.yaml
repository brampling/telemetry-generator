# Pre-commit hooks for this repo. Enable once per clone:
#   pip install pre-commit   # or: brew install pre-commit
#   pre-commit install
#
# gitleaks scans staged changes for secrets before each commit, so credentials
# can't be committed accidentally.
repos:
    - repo: https://github.com/gitleaks/gitleaks
      rev: v8.30.1
      hooks:
          - id: gitleaks
